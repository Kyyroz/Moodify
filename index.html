<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lofi room</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=DM+Serif+Display:ital@1&display=swap');
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --warm:#e8c97a;
    --warm-dim:rgba(255, 255, 255, 0.15);
    --warm-glow:rgba(191, 165, 100, 0.25);
    --white:rgba(255,255,255,0.85);
    --muted:rgba(255, 255, 255, 0.38);
    --panel:rgba(10,8,18,0.58);
    --radius:16px;
  }
  html,body{width:100%;height:100%;overflow:hidden;background:#050510;font-family:'Inter',sans-serif;font-weight:300;color:var(--white)}

  /* BG */
  #bg-video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:0;transition:opacity 1.2s ease}
  #bg-video.loaded{opacity:1}
  #bg-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0}
  .vignette{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,0.72) 100%);z-index:1;pointer-events:none}

  /* CLOCK */
  #clock{position:fixed;top:36px;left:50%;transform:translateX(-50%);z-index:10;font-family:'DM Serif Display',serif;font-style:italic;font-size:clamp(48px,8vw,88px);color:rgba(245, 242, 242, 0.585);letter-spacing:-0.02em;pointer-events:none;user-select:none}

  /* TRACK NAME TOAST */
  #track-toast{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    z-index:20;
    font-family:'DM Serif Display',serif;font-style:italic;
    font-size:clamp(22px,4vw,36px);
    color:rgba(36, 17, 17, 0.9);
    letter-spacing:0.01em;
    text-align:center;
    max-width:80vw;
    opacity:0;
    transition:opacity 0.4s ease;
    pointer-events:none;
    text-shadow:0 2px 24px rgba(0,0,0,0.8);
  }
  #track-toast.show{opacity:1}

  /* BG SWITCHER */
  #bg-switcher{
    position:fixed;top:36px;right:36px;z-index:10;
    display:flex;flex-direction:column;gap:8px;
    align-items:flex-end;
    transition:opacity 0.5s ease, transform 0.5s ease;
  }
  #bg-switcher.hidden{opacity:0;pointer-events:none;transform:translateX(10px)}
  .bg-btn{
    background:var(--panel);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:10px;
    color:var(--muted);
    font-family:'Inter',sans-serif;
    font-size:11px;
    font-weight:400;
    letter-spacing:0.04em;
    padding:7px 14px;
    cursor:pointer;
    transition:color 0.2s,background 0.2s,border-color 0.2s;
    white-space:nowrap;
  }
  .bg-btn:hover{color:var(--white);background:rgba(255,255,255,0.06)}
  .bg-btn.active{color:var(--warm);border-color:rgba(232,201,122,0.3);background:var(--warm-dim)}

  /* PLAYER */
  #player{
    position:fixed;bottom:36px;left:50%;transform:translateX(-50%);
    z-index:10;
    width:min(440px,calc(100vw - 40px));
    background:var(--panel);
    backdrop-filter:blur(24px) saturate(1.4);
    -webkit-backdrop-filter:blur(24px) saturate(1.4);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:var(--radius);
    padding:20px 26px 18px;
    display:flex;flex-direction:column;gap:14px;
    box-shadow:0 8px 48px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.04);
    transition:opacity 0.5s ease, transform 0.5s ease;
  }
  #player.hidden{opacity:0;pointer-events:none;transform:translateX(-50%) translateY(20px)}

  /* disc */
  .disc-wrap{width:38px;height:38px;border-radius:50%;background:var(--warm-dim);border:1px solid rgba(232,201,122,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  #disc-svg{animation:spin 8s linear infinite;animation-play-state:paused}
  #disc-svg.playing{animation-play-state:running}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* track row */
  .track-row{display:flex;align-items:center;gap:12px}
  .track-text{flex:1;min-width:0}
  .track-name{font-size:13px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:0.01em}
  .track-idx{font-size:10.5px;color:var(--muted);margin-top:2px;letter-spacing:0.04em;text-transform:uppercase}
  .status-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background 0.3s}
  .status-dot.on{background:var(--warm);box-shadow:0 0 6px var(--warm)}

  /* progress */
  .progress-wrap{display:flex;align-items:center;gap:10px}
  .t{font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums;width:32px;flex-shrink:0}
  .t.r{text-align:right}

  input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:3px;border-radius:99px;background:rgba(255,255,255,0.12);outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--warm);box-shadow:0 0 8px rgba(232,201,122,0.6);cursor:pointer;transition:transform 0.15s}
  input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.3)}
  input[type=range]::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:var(--warm);border:none;cursor:pointer}
  #progress{--pct:0%;background:linear-gradient(to right,var(--warm) var(--pct),rgba(255,255,255,0.12) var(--pct))}
  #volume{--pct:60%;background:linear-gradient(to right,rgba(232,201,122,0.6) var(--pct),rgba(255,255,255,0.12) var(--pct))}

  /* controls */
  .controls{display:flex;align-items:center;justify-content:space-between}
  .vol-group{display:flex;align-items:center;gap:8px;flex:1;max-width:120px}
  .vol-icon{color:var(--muted);flex-shrink:0}
  .ctrl-group{display:flex;align-items:center;gap:4px}

  button{background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;padding:6px;border-radius:8px;transition:color 0.2s,background 0.2s}
  button:hover{color:var(--white);background:rgba(255,255,255,0.06)}
  button.active{color:var(--warm)}

  #btn-play{width:44px;height:44px;border-radius:50%;background:var(--warm-dim);border:1px solid rgba(232,201,122,0.25);color:var(--warm);transition:background 0.2s,transform 0.15s}
  #btn-play:hover{background:var(--warm-glow);transform:scale(1.05)}

  /* right edge trigger zone */
  #edge-trigger{position:fixed;top:0;right:0;width:40px;height:100%;z-index:9;cursor:default}

  #no-music{text-align:center;font-size:11.5px;color:var(--muted);display:none;padding:2px 0}
</style>
</head>
<body>

<video id="bg-video" autoplay loop muted playsinline></video>
<canvas id="bg-canvas"></canvas>
<div class="vignette"></div>

<div id="clock">00:00</div>
<div id="track-toast"></div>

<!-- BG switcher -->
<div id="bg-switcher"></div>

<!-- Player -->
<div id="player">
  <div class="track-row">
    <div class="disc-wrap">
      <svg id="disc-svg" width="20" height="20" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="10" stroke="rgba(232,201,122,0.5)" stroke-width="1.5"/>
        <circle cx="11" cy="11" r="5" stroke="rgba(232,201,122,0.3)" stroke-width="1"/>
        <circle cx="11" cy="11" r="1.5" fill="rgba(232,201,122,0.7)"/>
        <path d="M11 1 A10 10 0 0 1 21 11" stroke="rgba(232,201,122,0.8)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="track-text">
      <div class="track-name" id="track-name">no music loaded</div>
      <div class="track-idx" id="track-idx">add mp3s to assets/music/</div>
    </div>
    <div class="status-dot" id="status-dot"></div>
  </div>

  <div id="no-music">edit <code>assets/music/playlist.json</code> with your filenames</div>

  <div class="progress-wrap">
    <span class="t" id="time-cur">0:00</span>
    <input type="range" id="progress" min="0" max="100" value="0" step="0.1">
    <span class="t r" id="time-dur">0:00</span>
  </div>

  <div class="controls">
    <div class="vol-group">
      <svg class="vol-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
      <input type="range" id="volume" min="0" max="100" value="60">
    </div>

    <div class="ctrl-group">
      <button id="btn-prev" title="Previous track">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button id="btn-play" title="Play / Pause">
        <svg id="icon-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button id="btn-next" title="Next track">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>
    </div>

    <div class="ctrl-group">
      <button id="btn-shuffle" title="Shuffle">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
          <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
        </svg>
      </button>
      <button id="btn-loop" title="Loop">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div id="edge-trigger"></div>

<script>
// ── CLOCK ──────────────────────────────────────────────────────
const clockEl = document.getElementById('clock');
function updateClock(){
  const n=new Date();
  clockEl.textContent=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}
updateClock(); setInterval(updateClock,1000);

// ── CANVAS FALLBACK ────────────────────────────────────────────
const canvas=document.getElementById('bg-canvas');
const ctx=canvas.getContext('2d');
let W,H,drops=[],steamPuffs=[],ct=0,canvasRunning=true;

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}

class RainDrop{
  constructor(){this.reset()}
  reset(){this.x=Math.random()*W;this.y=Math.random()*H-H;this.len=Math.random()*16+6;this.speed=Math.random()*5+7;this.alpha=Math.random()*0.2+0.06;this.wind=1.1;}
  update(){this.x+=this.wind;this.y+=this.speed;if(this.y>H+20)this.reset();}
  draw(){ctx.beginPath();ctx.moveTo(this.x,this.y);ctx.lineTo(this.x+this.wind*2,this.y+this.len);ctx.strokeStyle=`rgba(180,210,255,${this.alpha})`;ctx.lineWidth=0.7;ctx.stroke();}
}
class Steam{
  constructor(x,y){this.ox=x;this.oy=y;this.reset()}
  reset(){this.x=this.ox+(Math.random()-.5)*6;this.y=this.oy;this.vy=-(Math.random()*.35+.15);this.vx=(Math.random()-.5)*.25;this.alpha=.32;this.r=Math.random()*2.5+1.5;this.life=0;this.maxLife=Math.random()*70+50;}
  update(){this.x+=this.vx+Math.sin(this.life*.09)*.25;this.y+=this.vy;this.life++;this.alpha=.32*(1-this.life/this.maxLife);this.r+=.035;if(this.life>this.maxLife)this.reset();}
  draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,240,220,${this.alpha})`;ctx.fill();}
}

function drawScene(){
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0d0a18');bg.addColorStop(1,'#1a120a');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  const wx=W*.5-160,wy=H*.08,ww=320,wh=260;
  const glow=ctx.createRadialGradient(W*.5,wy+wh*.5,0,W*.5,wy+wh*.5,240);
  glow.addColorStop(0,'rgba(60,80,140,.15)');glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glow;ctx.fillRect(0,0,W,H);
  ctx.save();ctx.beginPath();ctx.rect(wx+12,wy+12,ww-24,wh-24);ctx.clip();
  const sky=ctx.createLinearGradient(0,wy,0,wy+wh);
  sky.addColorStop(0,'#0c1020');sky.addColorStop(.5,'#141828');sky.addColorStop(1,'#1e1a10');
  ctx.fillStyle=sky;ctx.fillRect(wx,wy,ww,wh);
  const bldgs=[[wx+14,wy+wh*.45,22,wh*.45],[wx+36,wy+wh*.35,18,wh*.55],[wx+54,wy+wh*.5,28,wh*.42],[wx+82,wy+wh*.3,16,wh*.6],[wx+98,wy+wh*.42,24,wh*.48],[wx+122,wy+wh*.25,20,wh*.65],[wx+142,wy+wh*.38,30,wh*.52],[wx+172,wy+wh*.28,18,wh*.62],[wx+190,wy+wh*.44,22,wh*.46],[wx+212,wy+wh*.32,26,wh*.58],[wx+238,wy+wh*.46,20,wh*.44],[wx+258,wy+wh*.36,24,wh*.54],[wx+282,wy+wh*.26,14,wh*.64]];
  bldgs.forEach(([bx,by,bw,bh])=>{ctx.fillStyle='#1a1822';ctx.fillRect(bx,by,bw,bh);for(let wy2=by+6;wy2<by+bh-10;wy2+=10)for(let wx2=bx+3;wx2<bx+bw-3;wx2+=7)if((Math.sin(wx2*13.7+wy2*7.3)*.5+.5)>.42){ctx.fillStyle=`rgba(255,220,140,${Math.random()*.25+.1})`;ctx.fillRect(wx2,wy2,3,4);}});
  drops.forEach(d=>{d.update();d.draw();});
  for(let i=0;i<10;i++){const sx=wx+14+(i/10)*(ww-28)+Math.sin(ct*.2+i)*2.5;ctx.beginPath();ctx.moveTo(sx,wy+14);ctx.bezierCurveTo(sx+Math.sin(i)*3,wy+50,sx-Math.sin(i)*2.5,wy+100,sx+Math.sin(i*2)*4,wy+140+i*7);ctx.strokeStyle=`rgba(180,210,255,${.025+Math.sin(ct*.3+i)*.01})`;ctx.lineWidth=1.2;ctx.stroke();}
  ctx.restore();
  ctx.fillStyle='#2a1f0f';ctx.fillRect(wx,wy,ww,12);ctx.fillRect(wx,wy+wh-12,ww,12);ctx.fillRect(wx,wy,12,wh);ctx.fillRect(wx+ww-12,wy,12,wh);ctx.fillRect(wx+ww/2-5,wy,10,wh);ctx.fillRect(wx,wy+wh/2-4,ww,8);
  ctx.strokeStyle='rgba(180,130,60,.25)';ctx.lineWidth=1;ctx.strokeRect(wx+1,wy+1,ww-2,wh-2);
  const floor=ctx.createLinearGradient(0,H*.72,0,H);floor.addColorStop(0,'#1e1408');floor.addColorStop(1,'#120d05');ctx.fillStyle=floor;ctx.fillRect(0,H*.72,W,H*.28);
  const deskY=H*.72,deskX=W*.5-220,deskW=440;ctx.fillStyle='#2e1f0a';ctx.fillRect(deskX,deskY,deskW,18);ctx.fillStyle='#3a2510';ctx.fillRect(deskX+2,deskY,deskW-4,6);ctx.fillStyle='#261a08';ctx.fillRect(deskX+20,deskY+18,14,H*.25);ctx.fillRect(deskX+deskW-34,deskY+18,14,H*.25);
  const lx=W*.5+120,ly=deskY;ctx.fillStyle='#3a2a10';ctx.fillRect(lx-8,ly-4,16,4);ctx.fillStyle='#4a3418';ctx.fillRect(lx-3,ly-60,6,60);ctx.beginPath();ctx.moveTo(lx-28,ly-60);ctx.lineTo(lx+12,ly-60);ctx.lineTo(lx+6,ly-80);ctx.lineTo(lx-22,ly-80);ctx.closePath();ctx.fillStyle='#c87a20';ctx.fill();
  const lampGlow=ctx.createRadialGradient(lx-8,ly-55,0,lx-8,ly-30,180);lampGlow.addColorStop(0,'rgba(255,200,80,.16)');lampGlow.addColorStop(.4,'rgba(255,160,40,.07)');lampGlow.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=lampGlow;ctx.fillRect(lx-200,ly-200,400,300);
  const mx=W*.5-40,my=deskY-32;ctx.fillStyle='#4a3020';ctx.beginPath();ctx.roundRect(mx,my,28,32,3);ctx.fill();ctx.fillStyle='#5a3828';ctx.fillRect(mx+2,my+2,24,6);ctx.beginPath();ctx.arc(mx+32,my+16,10,-.8,.8);ctx.strokeStyle='#4a3020';ctx.lineWidth=4;ctx.stroke();ctx.fillStyle='rgba(180,100,30,.6)';ctx.fillRect(mx+3,my+8,22,5);
  steamPuffs.forEach(s=>{s.update();s.draw();});
  const bookX=W*.5-160,bookY=deskY-10;[[20,'#8b2020'],[18,'#204080'],[22,'#206040']].forEach(([bh,col],i)=>{ctx.fillStyle=col;ctx.fillRect(bookX,bookY-i*bh,60,bh-1);ctx.fillStyle='rgba(255,255,255,.05)';ctx.fillRect(bookX+2,bookY-i*bh,56,3);});
  const nx=W*.5-15,ny=deskY-22;ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.roundRect(nx,ny,90,60,4);ctx.fill();ctx.fillStyle='#0a0a18';ctx.fillRect(nx+4,ny+4,82,52);const sg=ctx.createLinearGradient(nx,ny,nx+90,ny+60);sg.addColorStop(0,'rgba(80,120,255,.12)');sg.addColorStop(1,'rgba(40,80,180,.08)');ctx.fillStyle=sg;ctx.fillRect(nx+4,ny+4,82,52);[0,1,2,3,4].forEach(i=>{ctx.fillStyle=`rgba(100,180,255,${.35-i*.05})`;ctx.fillRect(nx+8,ny+10+i*9,[50,35,45,25,40][i],3);});
  const wall=ctx.createLinearGradient(0,0,0,H*.72);wall.addColorStop(0,'rgba(40,20,5,.55)');wall.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=wall;ctx.fillRect(0,0,W,H*.72);
  const pool=ctx.createRadialGradient(lx-8,deskY,0,lx-8,deskY,110);pool.addColorStop(0,'rgba(255,180,60,.1)');pool.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=pool;ctx.fillRect(lx-140,deskY-20,280,60);
  const vig=ctx.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,H*.85);vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,.7)');ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
}

function initCanvas(){
  resize();
  for(let i=0;i<120;i++) drops.push(new RainDrop());
  const mugX=W*.5-26,mugY=H*.72-22;
  for(let i=0;i<8;i++) steamPuffs.push(new Steam(mugX,mugY));
  window.addEventListener('resize',()=>{resize();drops.forEach(d=>d.reset());});
  (function loop(){if(canvasRunning){drawScene();ct+=.016;}requestAnimationFrame(loop);})();
}
initCanvas();

// ── BACKGROUND SWITCHER ────────────────────────────────────────
const bgVideo = document.getElementById('bg-video');
const bgCanvas = document.getElementById('bg-canvas');
const bgSwitcher = document.getElementById('bg-switcher');

let bgList = []; // loaded from bg-manifest.json
let currentBg = -1; // -1 = canvas fallback

async function loadBgManifest(){
  try {
    const res = await fetch('assets/video/manifest.json');
    if(res.ok){
      const data = await res.json();
      bgList = data; // array of {file, label}
    }
  } catch(e){}
  buildBgButtons();
}

function buildBgButtons(){
  bgSwitcher.innerHTML='';

  // canvas button (always first)
  const canvasBtn = document.createElement('button');
  canvasBtn.className='bg-btn active';
  canvasBtn.textContent='cozy room';
  canvasBtn.dataset.index='-1';
  canvasBtn.addEventListener('click',()=>switchBg(-1));
  bgSwitcher.appendChild(canvasBtn);

  // video buttons
  bgList.forEach((bg,i)=>{
    const btn=document.createElement('button');
    btn.className='bg-btn';
    btn.textContent=bg.label||`scene ${i+1}`;
    btn.dataset.index=i;
    btn.addEventListener('click',()=>switchBg(i));
    bgSwitcher.appendChild(btn);
  });
}

function switchBg(index){
  currentBg=index;
  // update active button
  document.querySelectorAll('.bg-btn').forEach(b=>{
    b.classList.toggle('active', parseInt(b.dataset.index)===index);
  });

  if(index===-1){
    // canvas mode
    bgVideo.style.opacity='0';
    setTimeout(()=>{bgVideo.src='';bgVideo.load();},600);
    bgCanvas.style.display='block';
    canvasRunning=true;
  } else {
    // video mode
    const bg=bgList[index];
    canvasRunning=false;
    bgCanvas.style.display='none';
    bgVideo.style.opacity='0';
    bgVideo.src=`assets/video/${bg.file}`;
    bgVideo.load();
    bgVideo.play().catch(()=>{});
    bgVideo.onloadeddata=()=>{bgVideo.style.opacity='1';};
  }
}

loadBgManifest();

// ── MUSIC PLAYER ───────────────────────────────────────────────
const audio=new Audio();
audio.volume=0.6;
let playlist=[],currentTrack=0,isShuffled=false,isLooped=false,isDragging=false;
let toastTimer=null;

const toast=document.getElementById('track-toast');
function showToast(name){
  toast.textContent=name;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toast.classList.remove('show'),5000);
}

async function loadPlaylist(){
  try{
    const res=await fetch('assets/music/playlist.json');
    if(res.ok){
      const data=await res.json();
      playlist=data.map(f=>({file:`assets/music/${f}`,name:f.replace(/\.(mp3|wav|ogg|flac|m4a)$/i,'').replace(/[-_]/g,' ')}));
    }
  }catch(e){}
  initPlayer();
}

function initPlayer(){
  if(playlist.length===0){
    document.getElementById('track-name').textContent='no music loaded';
    document.getElementById('no-music').style.display='block';
    return;
  }
  // autoplay: try immediately, fallback to first user interaction
  loadTrack(0, false, false);
  const tryAutoplay = ()=>{
    audio.play().then(()=>{
      document.getElementById('icon-play').style.display='none';
      document.getElementById('icon-pause').style.display='block';
      document.getElementById('disc-svg').classList.add('playing');
      document.getElementById('status-dot').classList.add('on');
    }).catch(()=>{
      // browser blocked autoplay — wait for first click anywhere
      const unlock = ()=>{
        audio.play().catch(()=>{});
        document.getElementById('icon-play').style.display='none';
        document.getElementById('icon-pause').style.display='block';
        document.getElementById('disc-svg').classList.add('playing');
        document.getElementById('status-dot').classList.add('on');
        document.removeEventListener('click', unlock);
        document.removeEventListener('keydown', unlock);
      };
      document.addEventListener('click', unlock);
      document.addEventListener('keydown', unlock);
    });
  };
  audio.addEventListener('canplay', tryAutoplay, {once: true});
}

function loadTrack(index,play=true,showName=true){
  currentTrack=index;
  const track=playlist[index];
  audio.src=track.file;
  document.getElementById('track-name').textContent=track.name;
  document.getElementById('track-idx').textContent=`${index+1} / ${playlist.length}`;
  audio.load();
  if(play) playTrack();
  if(showName) showToast(track.name);
}

function playTrack(){
  audio.play().catch(()=>{});
  document.getElementById('icon-play').style.display='none';
  document.getElementById('icon-pause').style.display='block';
  document.getElementById('disc-svg').classList.add('playing');
  document.getElementById('status-dot').classList.add('on');
}
function pauseTrack(){
  audio.pause();
  document.getElementById('icon-play').style.display='block';
  document.getElementById('icon-pause').style.display='none';
  document.getElementById('disc-svg').classList.remove('playing');
  document.getElementById('status-dot').classList.remove('on');
}

function nextTrack(){
  const next=(currentTrack+1)%playlist.length;
  loadTrack(next,true,true);
}
function prevTrack(){
  if(audio.currentTime>3){audio.currentTime=0;return;}
  const prev=(currentTrack-1+playlist.length)%playlist.length;
  loadTrack(prev,true,true);
}

function fmtTime(s){if(isNaN(s))return'0:00';return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;}

document.getElementById('btn-play').addEventListener('click',()=>{if(!playlist.length)return;audio.paused?playTrack():pauseTrack();});
document.getElementById('btn-next').addEventListener('click',()=>{if(playlist.length>1)nextTrack();});
document.getElementById('btn-prev').addEventListener('click',()=>{if(playlist.length>0)prevTrack();});

document.getElementById('btn-shuffle').addEventListener('click',function(){
  isShuffled=!isShuffled;this.classList.toggle('active',isShuffled);
});
document.getElementById('btn-loop').addEventListener('click',function(){
  isLooped=!isLooped;audio.loop=isLooped;this.classList.toggle('active',isLooped);
});

const progressEl=document.getElementById('progress');
audio.addEventListener('timeupdate',()=>{
  if(isDragging||!audio.duration)return;
  const pct=(audio.currentTime/audio.duration)*100;
  progressEl.value=pct;progressEl.style.setProperty('--pct',pct+'%');
  document.getElementById('time-cur').textContent=fmtTime(audio.currentTime);
  document.getElementById('time-dur').textContent=fmtTime(audio.duration);
});
progressEl.addEventListener('mousedown',()=>isDragging=true);
progressEl.addEventListener('input',()=>{
  progressEl.style.setProperty('--pct',progressEl.value+'%');
  if(audio.duration)document.getElementById('time-cur').textContent=fmtTime(audio.duration*(progressEl.value/100));
});
progressEl.addEventListener('change',()=>{if(audio.duration)audio.currentTime=audio.duration*(progressEl.value/100);isDragging=false;});

const volumeEl=document.getElementById('volume');
volumeEl.addEventListener('input',()=>{audio.volume=volumeEl.value/100;volumeEl.style.setProperty('--pct',volumeEl.value+'%');});

audio.addEventListener('ended',()=>{if(!isLooped&&playlist.length>1)nextTrack();});

// ── CONTROLS VISIBILITY ────────────────────────────────────────
const playerEl = document.getElementById('player');
const bgSwitcherEl = document.getElementById('bg-switcher');
const edgeTrigger = document.getElementById('edge-trigger');
let controlsVisible = true;
let hideTimer = null;

function showControls(){
  controlsVisible = true;
  playerEl.classList.remove('hidden');
  bgSwitcherEl.classList.remove('hidden');
}

function scheduleHide(){
  clearTimeout(hideTimer);
  hideTimer = setTimeout(()=>{
    controlsVisible = false;
    playerEl.classList.add('hidden');
    bgSwitcherEl.classList.add('hidden');
  }, 5000);
}

// hide after 5s on load
scheduleHide();

// right edge triggers show
edgeTrigger.addEventListener('mouseenter', ()=>{
  showControls();
  scheduleHide();
});

// moving mouse anywhere resets the hide timer while controls visible
document.addEventListener('mousemove', e=>{
  if(controlsVisible){
    scheduleHide();
  }
  // if hidden and mouse touches right 40px — show
  if(!controlsVisible && e.clientX >= window.innerWidth - 40){
    showControls();
    scheduleHide();
  }
});

// space to play/pause
document.addEventListener('keydown', e=>{
  if(e.key===' '){e.preventDefault();document.getElementById('btn-play').click();}
});

loadPlaylist();
</script>
</body>
</html>
